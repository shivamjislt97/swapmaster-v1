<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Swap Master V5 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:#0D0D0D;color:#fff;min-height:100vh;padding-bottom:60px;overflow-x:hidden;transition:background-color 0.8s ease}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0A0A0A}::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:2px}

/* ANIMATIONS */
@keyframes nodePulse{0%,100%{box-shadow:0 0 8px var(--nc,#FF8C00)}50%{box-shadow:0 0 20px var(--nc,#FF8C00),0 0 40px rgba(255,140,0,.25)}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes liveDot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(200px) rotate(360deg);opacity:0}}
@keyframes idleSpin{to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,#1A1A1A 25%,#222 50%,#1A1A1A 75%);background-size:400px 100%;animation:shimmer 1.5s infinite;border-radius:4px;display:inline-block}

/* HEADER CARD */
.hdr{margin:8px;background:#161616;border:1px solid #222;border-radius:12px;padding:14px 16px}
.hdr-r1{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;margin-bottom:6px}
.brand{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#FF8C00;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 260px);flex-shrink:1}
.live-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;border:1px solid #333;background:#1A1A1A;color:#888;transition:all .3s;white-space:nowrap;flex-shrink:0}
.live-chip.green{background:#00C85320;border-color:#00C853;color:#00C853}
.live-chip.amber{background:#FFB30020;border-color:#FFB300;color:#FFB300}
.live-dot-anim{animation:liveDot 1.5s infinite}
.elapsed-chip{margin-left:auto;font-family:'Fira Code',monospace;font-size:13px;color:#FF8C00;background:#1A1A1A;border:1px solid #333;padding:6px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.hdr-r2{font-size:12px;color:#888;font-family:'DM Sans',sans-serif}

/* PIPELINE STRIP */
.pipe{margin:0 8px 8px;display:flex;align-items:center;justify-content:space-between;padding:4px 8px}
.pnode{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .5s;flex-shrink:0;position:relative;z-index:1}
.pnode.done{background:#00C853;color:#fff;font-size:14px}
.pnode.active{background:var(--nc,#FF8C00);color:#fff;font-family:'Orbitron',sans-serif;--node-color:var(--nc,#FF8C00);animation:nodePulse 2s infinite}
.pnode.pending{background:#1E1E1E;border:2px solid #2A2A2A;color:#555;font-family:'DM Sans',sans-serif}
.pconn{flex:1;height:2px;transition:all .5s;margin:0 1px}
.pconn.done{background:#00C853}
.pconn.active{background:linear-gradient(to right,var(--nc,#FF8C00),#2A2A2A)}
.pconn.pending{background:#2A2A2A}

/* HERO CARD */
.hero{margin:0 8px 8px;background:#111;border:1px solid rgba(255,140,0,.4);border-radius:14px;padding:16px;transition:border-color .8s,background .8s,box-shadow .8s;position:relative;overflow:hidden}
.hero-top{display:flex;gap:12px;align-items:flex-start}

/* RING */
.ring-wrap{position:relative;width:160px;height:160px;flex-shrink:0}
.ring-wrap canvas{position:absolute;top:0;left:0;pointer-events:none}
.ring-svg{position:absolute;top:0;left:0;transition:filter .8s;will-change:filter}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.ring-pct{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:700;line-height:1;transition:color .8s}
.ring-lbl{font-size:10px;color:#888;margin-top:3px;font-family:'DM Sans',sans-serif}

/* RIGHT COLUMN */
.ring-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.frame-ctr{font-family:'Fira Code',monospace;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.frame-lbl{font-size:11px;color:#888;font-family:'DM Sans',sans-serif}
.spark-wrap{width:100%;height:70px;position:relative}
#spark-cv{display:block;width:100%;height:70px}

/* SUBSTEPS */
.substeps{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.srow{height:56px;background:#1A1A1A;border-radius:8px;padding:0 12px;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;transition:border-color .5s}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .5s}
.sdot.done{background:#00C853}
.sdot.active{animation:dotPulse 1.5s infinite}
.sdot.pending{background:#3A3A3A}
.sicon{width:34px;height:34px;background:#222;border:1px solid #2A2A2A;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stxt{flex:1;min-width:0}
.sname{font-size:14px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif}
.ssub{font-size:12px;transition:color .5s;font-family:'DM Sans',sans-serif}
.schip{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid;flex-shrink:0;transition:all .5s;white-space:nowrap}
.schip.done{background:#00C85320;border-color:#00C853;color:#00C853}
.schip.pending{background:#1E1E1E;border-color:#2A2A2A;color:#555}

/* STATS ROW */
.stats-row{display:flex;gap:8px;margin-top:10px}
.scard{flex:1;min-width:0;background:#1A1A1A;border:1px solid #222;border-radius:8px;height:72px;display:flex;align-items:center;padding:0 10px;gap:8px;overflow:hidden}
.scard-icon{font-size:20px;flex-shrink:0;transition:color .8s}
.scard-body{display:flex;flex-direction:column;min-width:0}
.scard-val{font-family:'Fira Code',monospace;font-size:20px;font-weight:700;white-space:nowrap;transition:color .8s}
.scard-lbl{font-size:9px;color:#888;font-family:'DM Sans',sans-serif}
.eta-stack{display:flex;flex-direction:column;line-height:1.1}
.eta-line{font-family:'Fira Code',monospace;font-size:17px;font-weight:700;transition:color .8s}

/* GPU ROW */
.gpu-row{margin-top:10px}
.gpu-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.gpu-lbl{font-size:11px;color:#888;font-family:'DM Sans',sans-serif}
.gpu-pct{font-family:'Fira Code',monospace;font-size:13px;font-weight:700;transition:color .8s}
.gpu-bg{height:7px;background:#222;border-radius:4px;overflow:hidden}
.gpu-fill{height:100%;border-radius:4px;transition:width .8s ease,background-color .8s ease;width:0%}
.gpu-upd{font-size:9px;color:#444;text-align:right;margin-top:3px;font-family:'DM Sans',sans-serif;cursor:pointer;user-select:none}

/* LOG CARD */
.log-card{margin:0 8px 8px;background:#161616;border:1px solid #1E1E1E;border-radius:12px}
.log-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.log-title{font-family:'Orbitron',sans-serif;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px}
.log-badge{width:24px;height:24px;background:#1E1E1E;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fira Code',monospace;font-size:12px;color:#888;flex-shrink:0}
.log-chev{font-size:12px;color:#888;transition:transform .2s;flex-shrink:0}
.log-chev.open{transform:rotate(180deg)}
.log-body{max-height:0;overflow:hidden;transition:max-height .3s;-webkit-overflow-scrolling:touch}
.log-body.open{max-height:220px;overflow-y:auto}
.log-row{padding:8px 16px;border-top:1px solid #1A1A1A;display:flex;gap:8px;align-items:flex-start;min-height:40px;font-size:11px}
.log-ts{font-family:'Fira Code',monospace;font-size:10px;color:#444;width:58px;flex-shrink:0;padding-top:2px}
.log-sev{font-family:'Fira Code',monospace;font-size:10px;padding:2px 4px;border-radius:4px;width:52px;text-align:center;flex-shrink:0;height:18px;line-height:14px}
.sev-INFO{background:#00F5FF20;color:#00F5FF}
.sev-SUCCESS{background:#00C85320;color:#00C853}
.sev-WARNING{background:#FFB30020;color:#FFB300}
.sev-ERROR{background:#FF000020;color:#FF0000}
.sev-GPU{background:#7C3AED20;color:#7C3AED}
.log-msg{font-family:'Fira Code',monospace;color:#CCC;word-break:break-word;flex:1}

/* BOTTOM BAR */
.bot-bar{position:fixed;bottom:0;left:0;right:0;height:52px;background:#0A0A0A;border-top:1px solid #1E1E1E;padding:0 12px;display:flex;align-items:center;justify-content:space-between;z-index:1000}
.bb-left{display:flex;align-items:center;gap:6px;width:40%}
.bb-gpu-lbl{font-size:9px;color:#FF8C00;font-weight:700;font-family:'DM Sans',sans-serif;white-space:nowrap}
.bb-gpu-txt{font-family:'Fira Code',monospace;font-size:10px;color:#fff;white-space:nowrap}
.bb-bar-bg{width:50px;height:4px;background:#2A2A2A;border-radius:2px;flex-shrink:0;overflow:hidden}
.bb-bar-fill{height:100%;border-radius:2px;transition:width .8s ease,background-color .8s ease}
.bb-vram{font-family:'Fira Code',monospace;font-size:10px;color:#666;white-space:nowrap}
.bb-center{display:flex;flex-direction:column;align-items:center;width:30%}
.bb-q-lbl{font-size:9px;color:#FF8C00;font-weight:700;font-family:'DM Sans',sans-serif}
.bb-q-val{font-family:'Fira Code',monospace;font-size:10px;color:#fff}
.bb-right{display:flex;flex-direction:column;align-items:flex-end;width:30%;gap:2px}
.bb-sleep{font-family:'Fira Code',monospace;font-size:10px;color:#FFB300}
.bb-active{font-family:'Fira Code',monospace;font-size:10px;color:#00C853}

/* IDLE STATE */
.idle-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.idle-ring{width:80px;height:80px;border:3px dashed #222;border-radius:50%;animation:idleSpin 3s linear infinite}
.idle-title{font-family:'Orbitron',sans-serif;font-size:18px;color:#555}
.idle-sub{font-size:13px;color:#333;text-align:center;font-family:'DM Sans',sans-serif}

/* COMPLETE STATE */
.complete-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;position:relative;overflow:hidden}
.complete-icon{font-size:48px}
.complete-title{font-family:'Orbitron',sans-serif;font-size:24px;color:#00C853}
.complete-stats{font-family:'Fira Code',monospace;font-size:13px;color:#888;text-align:center}
.complete-btn{background:#00C85320;border:1px solid #00C853;color:#00C853;font-family:'Orbitron',sans-serif;font-size:12px;padding:12px 24px;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block;margin-top:8px;transition:background .2s}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 2s ease-out forwards;pointer-events:none}

/* ERROR STATE */
.error-box{background:#1A0000;border:1px solid #FF000040;border-radius:8px;padding:12px;font-family:'Fira Code',monospace;font-size:11px;color:#FF6666}
.retry-chip{display:inline-block;background:#FF000020;border:1px solid #FF0000;font-family:'Orbitron',sans-serif;font-size:10px;color:#FF0000;padding:3px 8px;border-radius:4px;margin-top:6px}

/* MOBILE */
@media(max-width:768px){
  body{overflow-x:hidden}
  .hero{padding:12px}
  .frame-ctr{font-size:16px}
  .scard-val{font-size:17px}
  .eta-line{font-size:15px}
  .srow{height:52px}
  .log-body.open{max-height:200px}
  .brand{max-width:calc(100% - 210px)}
  .ring-wrap{width:150px;height:150px}
  .ring-wrap canvas{width:150px;height:150px}
  .ring-svg{width:150px;height:150px}
  .ring-pct{font-size:28px}
}
@media(max-width:400px){
  .brand{max-width:100px}
  .ring-wrap{width:130px;height:130px}
  .ring-wrap canvas{width:130px;height:130px}
  .ring-svg{width:130px;height:130px}
  .ring-pct{font-size:24px}
  .stats-row .scard-val{font-size:15px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-r1">
    <span style="font-size:18px;flex-shrink:0">⚡</span>
    <span class="brand">Swap Master V5 Pro</span>
    <span class="live-chip" id="live-chip"><span class="live-dot-anim">●</span>&nbsp;<span id="live-txt">Connecting...</span></span>
    <span class="elapsed-chip" id="elapsed">00:00:00</span>
  </div>
  <div class="hdr-r2" id="stage-subtitle">Waiting for job...</div>
</div>

<!-- PIPELINE STRIP -->
<div class="pipe" id="pipe"></div>

<!-- MAIN CONTENT -->
<div id="main-content">

<!-- IDLE -->
<div id="idle-card">
  <div class="idle-card">
    <div class="idle-ring"></div>
    <div class="idle-title">Waiting for next job...</div>
    <div class="idle-sub">Send a Mega link to the bot</div>
  </div>
</div>

<!-- HERO (hidden until job) -->
<div id="hero-wrap" style="display:none">
<div class="hero" id="hero-card">
  <div class="hero-top">
    <!-- Ring -->
    <div class="ring-wrap" id="ring-wrap">
      <canvas id="dots-cv" width="160" height="160"></canvas>
      <svg class="ring-svg" id="ring-svg" viewBox="0 0 160 160" width="160" height="160">
        <defs>
          <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6"/>
          </filter>
        </defs>
        <circle cx="80" cy="80" r="65" stroke="#222" stroke-width="14" fill="none"/>
        <circle id="ring-glow-arc" cx="80" cy="80" r="65" stroke="#FF8C00"
          stroke-width="22" stroke-opacity=".15" fill="none" stroke-linecap="round"
          stroke-dasharray="408.4" stroke-dashoffset="408.4"
          transform="rotate(-90 80 80)" filter="url(#gf)"
          style="transition:stroke-dashoffset 1.2s ease,stroke .8s ease"/>
        <circle id="ring-arc" cx="80" cy="80" r="65" stroke="#FF8C00"
          stroke-width="14" fill="none" stroke-linecap="round"
          stroke-dasharray="408.4" stroke-dashoffset="408.4"
          transform="rotate(-90 80 80)"
          style="transition:stroke-dashoffset 1.2s ease,stroke .8s ease"/>
      </svg>
      <div class="ring-center">
        <span class="ring-pct skeleton" id="ring-pct" style="min-width:60px;min-height:20px">—</span>
        <span class="ring-lbl">frames processed</span>
      </div>
    </div>
    <!-- Right column -->
    <div class="ring-right">
      <div class="frame-ctr skeleton" id="frame-ctr" style="min-width:140px;min-height:20px">—</div>
      <div class="frame-lbl">frames</div>
      <div class="spark-wrap"><canvas id="spark-cv" width="200" height="70"></canvas></div>
    </div>
  </div>

  <!-- SUBSTEPS -->
  <div class="substeps" id="substeps"></div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="scard">
      <span class="scard-icon" id="i-fps" style="color:#FF8C00">🏎</span>
      <div class="scard-body">
        <span class="scard-val skeleton" id="stat-fps" style="min-width:50px;min-height:18px">—</span>
        <span class="scard-lbl">SPEED</span>
      </div>
    </div>
    <div class="scard">
      <span class="scard-icon" id="i-vram" style="color:#FF8C00">⚙️</span>
      <div class="scard-body">
        <span class="scard-val skeleton" id="stat-vram" style="min-width:50px;min-height:18px">—</span>
        <span class="scard-lbl">VRAM</span>
      </div>
    </div>
    <div class="scard">
      <span class="scard-icon" id="i-eta" style="color:#FF8C00">🕐</span>
      <div class="scard-body" id="eta-body">
        <span class="scard-val" id="stat-eta" style="color:#FF8C00">—</span>
        <span class="scard-lbl">ETA</span>
      </div>
    </div>
  </div>

  <!-- GPU -->
  <div class="gpu-row">
    <div class="gpu-head">
      <span class="gpu-lbl">GPU Utilization</span>
      <span class="gpu-pct" id="gpu-pct">0%</span>
    </div>
    <div class="gpu-bg"><div class="gpu-fill" id="gpu-bar"></div></div>
    <div class="gpu-upd" id="upd-time" onclick="pollREST()">upd — 🔄</div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete-card" style="display:none">
  <div class="hero" style="border-color:#00C853;background:radial-gradient(ellipse at center,#00C85310,#111)">
    <div class="complete-wrap" id="complete-inner">
      <div class="complete-icon">✅</div>
      <div class="complete-title">Job Complete</div>
      <div class="complete-stats" id="complete-stats">—</div>
      <a class="complete-btn" id="complete-link" href="#" target="_blank" style="display:none">Open Output Link →</a>
    </div>
  </div>
</div>

<!-- ERROR -->
<div id="error-card" style="display:none">
  <div class="hero" style="border-color:#FF0000;background:radial-gradient(ellipse at top,#FF000008,#111)">
    <div class="error-box" id="error-msg">—</div>
  </div>
</div>
</div><!-- /hero-wrap -->

</div><!-- /main-content -->

<!-- LOG -->
<div class="log-card">
  <div class="log-hdr" onclick="toggleLog()">
    <div class="log-title">📋 <span>Live Log</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="log-badge" id="log-badge">0</div>
      <div class="log-chev" id="log-chev">▼</div>
    </div>
  </div>
  <div class="log-body" id="log-body">
    <div class="log-row skeleton" style="height:40px"></div>
    <div class="log-row skeleton" style="height:40px;margin-top:2px"></div>
    <div class="log-row skeleton" style="height:40px;margin-top:2px"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bot-bar">
  <div class="bb-left">
    <span class="bb-gpu-lbl">GPU</span>
    <span class="bb-gpu-txt" id="bb-gpu">Tesla T4</span>
    <div class="bb-bar-bg"><div class="bb-bar-fill" id="bb-fill" style="background:#FF8C00;width:0%"></div></div>
    <span class="bb-vram" id="bb-vram">0GB</span>
  </div>
  <div class="bb-center">
    <span class="bb-q-lbl">QUEUE</span>
    <span class="bb-q-val" id="bb-queue">0 jobs</span>
  </div>
  <div class="bb-right">
    <span style="font-size:20px" id="bb-icon">😊</span>
    <span class="bb-sleep" id="bb-status">Idle</span>
  </div>
</div>

<script>
// ─── COLOR SYSTEM ────────────────────────────────────────────────────────────
function interpolateColor(c1,c2,t){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const[r1,g1,b1]=p(c1);const[r2,g2,b2]=p(c2);
  return`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}
function getProgressColor(pct){
  const p=Math.max(0,Math.min(100,pct));
  if(p<=25) return interpolateColor('#00C853','#FFD600',p/25);
  if(p<=50) return interpolateColor('#FFD600','#FF8C00',(p-25)/25);
  if(p<=75) return interpolateColor('#FF8C00','#FF3D00',(p-50)/25);
  return interpolateColor('#FF3D00','#D50000',(p-75)/25);
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const STAGES=['Link Received','Downloading','Validating','Extracting Frames',
  'Analysing Faces','Face Swap Processing','Face Swap Processing',
  'Enhancing Frames','Verifying Frames','Merging + Uploading','Link Available'];
const STEP_META=[
  {icon:'🔍',name:'Detect Faces'},
  {icon:'👤',name:'Track Identity'},
  {icon:'👥',name:'Swap Faces'},
  {icon:'✨',name:'Enhance Output'},
];
const CIRC=408.4;
let sparkData=new Array(20).fill(0);
let lastDataTs=Date.now(),firstData=false,logCount=0,logOpen=false;
let elapsedStart=Date.now(),elapsedTimer,idleRAF=null,idlePhase=0,realDataSeen=false;
let ws,reconnectDelay=2000,hbTimer;
let lastLogTs=0;
const token=(new URLSearchParams(location.search)).get('token')||'';

// ─── BUILD DOM ────────────────────────────────────────────────────────────────
function buildPipe(){
  const w=document.getElementById('pipe');
  for(let i=0;i<11;i++){
    if(i>0){const c=document.createElement('div');c.className='pconn pending';c.id='pc'+i;w.appendChild(c);}
    const n=document.createElement('div');n.className='pnode pending';n.id='pn'+i;n.textContent=i+1;w.appendChild(n);
  }
}
function buildSubsteps(){
  const w=document.getElementById('substeps');
  STEP_META.forEach((m,i)=>{
    const r=document.createElement('div');r.className='srow';r.id='sr'+i;
    r.innerHTML=`<div class="sdot pending" id="sd${i}"></div>
      <div class="sicon">${m.icon}</div>
      <div class="stxt"><div class="sname">${m.name}</div><div class="ssub pending" id="ss${i}">Pending</div></div>
      <div class="schip pending" id="sc${i}">PENDING</div>`;
    w.appendChild(r);
  });
}
function drawDots(){
  const cv=document.getElementById('dots-cv'),ctx=cv.getContext('2d');
  for(let ring=0;ring<5;ring++){
    const r=20+ring*10;
    for(let d=0;d<36;d++){
      const a=(d/36)*Math.PI*2;
      ctx.beginPath();ctx.arc(80+r*Math.cos(a),80+r*Math.sin(a),1.5,0,Math.PI*2);
      ctx.fillStyle='#FF8C0018';ctx.fill();
    }
  }
}

// ─── APPLY COLOR EVERYWHERE ────────────────────────────────────────────────────
function applyColor(color,pct){
  document.documentElement.style.setProperty('--nc',color);
  // Ring
  document.getElementById('ring-arc').setAttribute('stroke',color);
  document.getElementById('ring-glow-arc').setAttribute('stroke',color);
  document.getElementById('ring-svg').style.filter=`drop-shadow(0 0 8px ${color})`;
  document.getElementById('ring-pct').style.color=color;
  // Hero border + bg
  const h=document.getElementById('hero-card');
  if(h){
    h.style.borderColor=`rgba(${hexToRgb(color)},0.4)`;
    h.style.background=`radial-gradient(ellipse at top left,${color}08 0%,transparent 55%),#111111`;
  }
  // Stats icons + values
  ['i-fps','i-vram','i-eta'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.color=color;});
  ['stat-fps','stat-vram','stat-eta'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.color=color;});
  document.querySelectorAll('.eta-line').forEach(e=>e.style.color=color);
  // GPU
  const gpb=document.getElementById('gpu-bar');if(gpb)gpb.style.backgroundColor=color;
  document.getElementById('gpu-pct').style.color=color;
  document.getElementById('bb-fill').style.backgroundColor=color;
  // Body tint
  if(pct<=25)document.body.style.backgroundColor='color-mix(in srgb,#00C85305,#0D0D0D)';
  else if(pct<=50)document.body.style.backgroundColor='color-mix(in srgb,#FFD60005,#0D0D0D)';
  else if(pct<=75)document.body.style.backgroundColor='color-mix(in srgb,#FF8C0005,#0D0D0D)';
  else document.body.style.backgroundColor='color-mix(in srgb,#D5000005,#0D0D0D)';
  // Fallback for browsers without color-mix
  try{document.body.style.backgroundColor;}catch(e){document.body.style.backgroundColor='#0D0D0D';}
  // Active substep chip
  for(let i=0;i<4;i++){
    const sc=document.getElementById('sc'+i);
    const sd=document.getElementById('sd'+i);
    if(sc&&sc.id==='sc'+i&&sc.dataset.state==='active'){
      sc.style.background=color+'20';sc.style.borderColor=color;sc.style.color=color;
    }
    if(sd&&sd.dataset.state==='active'){sd.style.backgroundColor=color;}
  }
}
function hexToRgb(c){
  if(c.startsWith('rgb')){const m=c.match(/\d+/g);return m?m.slice(0,3).join(','):'255,140,0';}
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return`${r},${g},${b}`;
}

// ─── UPDATE DASHBOARD ─────────────────────────────────────────────────────────
function updateDashboard(data){
  if(!firstData){removeSkeleton();firstData=true;}
  lastDataTs=Date.now();
  // Show hero, hide idle
  document.getElementById('idle-card').style.display='none';
  document.getElementById('hero-wrap').style.display='';

  const pct=Math.max(0,Math.min(100,parseInt(data.pct||data.percent||0)));
  const done=parseInt(data.frames_done||data.current_frame||0);
  const total=parseInt(data.frames_total||data.total_frames||0);
  const fps=parseFloat(data.speed_fps||data.fps||0).toFixed(1);
  const vram=parseFloat(data.vram_gb||0).toFixed(1);
  const eta=parseInt(data.eta_s||data.eta_seconds||0);
  const gpu=parseInt(data.gpu_util||data.gpu_percent||0);
  const gpuName=String(data.gpu_name||'Tesla T4');
  const stageNum=Math.max(0,Math.min(11,parseInt(data.stage_num||data.stage||0)));
  const phase=String(data.phase||data.status||'idle').toLowerCase();

  const color=getProgressColor(pct);
  applyColor(color,pct);

  // Ring
  document.getElementById('ring-arc').setAttribute('stroke-dashoffset',CIRC*(1-pct/100));
  document.getElementById('ring-glow-arc').setAttribute('stroke-dashoffset',CIRC*(1-pct/100));
  document.getElementById('ring-pct').textContent=pct+'%';

  // Frame counter
  document.getElementById('frame-ctr').textContent=
    total>0?`${done.toLocaleString()} / ${total.toLocaleString()}`:(done>0?String(done.toLocaleString()):'—');

  // Stats
  document.getElementById('stat-fps').textContent=fps+' fps';
  document.getElementById('stat-vram').textContent=vram+' GB';
  renderETA(eta,color);

  // GPU
  document.getElementById('gpu-bar').style.width=gpu+'%';
  document.getElementById('gpu-pct').textContent=gpu+'%';
  document.getElementById('gpu-pct').style.color=getProgressColor(gpu);
  document.getElementById('gpu-bar').style.backgroundColor=getProgressColor(gpu);
  document.getElementById('bb-fill').style.backgroundColor=getProgressColor(gpu);
  document.getElementById('bb-fill').style.width=gpu+'%';
  document.getElementById('bb-gpu').textContent=`${gpuName} · ${gpu}%`;
  document.getElementById('bb-vram').textContent=vram+'GB';
  document.getElementById('upd-time').textContent=`upd ${new Date().toTimeString().slice(0,8)} 🔄`;

  // Pipeline
  const sn=stageNum-1;
  for(let i=0;i<11;i++){
    const n=document.getElementById('pn'+i);if(!n)continue;
    if(i<sn){n.className='pnode done';n.textContent='✓';}
    else if(i===sn){n.className='pnode active';n.textContent=i+1;n.style.setProperty('--nc',color);}
    else{n.className='pnode pending';n.textContent=i+1;}
    const c=document.getElementById('pc'+i);if(!c)continue;
    c.className=i<sn?'pconn done':i===sn?'pconn active':'pconn pending';
  }

  // Stage subtitle
  const sDisplay=Math.max(1,Math.min(11,stageNum||1));
  document.getElementById('stage-subtitle').textContent=`Stage ${sDisplay} of 11 — ${STAGES[sDisplay-1]}`;

  // Substeps (map stage to which substep is active)
  let activeStep=-1;
  if(stageNum===5)activeStep=0;
  else if(stageNum===6)activeStep=1;
  else if(stageNum===7)activeStep=2;
  else if(stageNum>=8&&stageNum<=9)activeStep=3;
  const allDone=stageNum>9;

  for(let i=0;i<4;i++){
    const row=document.getElementById('sr'+i);
    const dot=document.getElementById('sd'+i);
    const sub=document.getElementById('ss'+i);
    const chip=document.getElementById('sc'+i);
    if(!row)continue;
    if(allDone||i<activeStep){
      row.className='srow';row.style.borderLeftColor='transparent';
      dot.className='sdot done';dot.dataset.state='done';dot.style.backgroundColor='';
      sub.className='ssub';sub.style.color='#00C853';sub.textContent='Completed';
      chip.className='schip done';chip.textContent='DONE ✓';chip.dataset.state='done';chip.style.cssText='';
    }else if(i===activeStep){
      row.className='srow';row.style.borderLeftColor=color;
      dot.className='sdot active';dot.dataset.state='active';dot.style.backgroundColor=color;
      sub.className='ssub';sub.style.color=color;sub.textContent='In Progress';
      chip.className='schip';chip.textContent='● ACTIVE';chip.dataset.state='active';
      chip.style.background=color+'20';chip.style.borderColor=color;chip.style.color=color;
    }else{
      row.className='srow';row.style.borderLeftColor='transparent';
      dot.className='sdot pending';dot.dataset.state='pending';dot.style.backgroundColor='';
      sub.className='ssub pending';sub.style.color='';sub.textContent='Pending';
      chip.className='schip pending';chip.textContent='PENDING';chip.dataset.state='pending';chip.style.cssText='';
    }
  }

  // Bottom right
  const bsEl=document.getElementById('bb-status');
  if(phase==='idle'||phase==='queued'){bsEl.textContent='Idle';bsEl.className='bb-sleep';document.getElementById('bb-icon').textContent='😊';}
  else{bsEl.textContent='🔄 Active';bsEl.className='bb-active';document.getElementById('bb-icon').textContent='⚡';}

  // State switch
  if(phase==='completed'||phase==='done')showComplete(data,done,total,fps);
  else if(phase==='failed'||phase==='error')showError(data.details||data.error||'Pipeline failed');
  else{document.getElementById('hero-card').style.display='';document.getElementById('complete-card').style.display='none';document.getElementById('error-card').style.display='none';}

  // Sparkline
  const hasRealData=done>0||pct>0;
  if(hasRealData&&!realDataSeen){realDataSeen=true;if(idleRAF){cancelAnimationFrame(idleRAF);idleRAF=null;}}
  sparkData.shift();sparkData.push(hasRealData?(done||pct):0);
  if(realDataSeen)drawSparkline();

  // Logs — merge server messages
  const msgs=data._msgs||data.messages||data.logs;
  if(Array.isArray(msgs)&&msgs.length)appendLogs(msgs);
}

function renderETA(sec,color){
  const body=document.getElementById('eta-body');
  const lbl=body.querySelector('.scard-lbl');
  // Remove old value elements
  body.innerHTML='';
  let v;
  if(!sec||sec<=0){
    v=document.createElement('span');v.id='stat-eta';v.className='scard-val';v.style.color=color;v.textContent='—';
  }else{
    const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    if(h>0){
      v=document.createElement('span');v.id='stat-eta';v.className='eta-stack';
      v.innerHTML=`<span class="eta-line" style="color:${color}">${h}h</span><span class="eta-line" style="color:${color}">${m}m</span>`;
    }else{
      v=document.createElement('span');v.id='stat-eta';v.className='scard-val';v.style.color=color;
      v.textContent=m>0?`${m}m ${s}s`:`${s}s`;
    }
  }
  body.appendChild(v);
  const nl=document.createElement('span');nl.className='scard-lbl';nl.textContent='ETA';body.appendChild(nl);
}

function showComplete(data,done,total,fps){
  document.getElementById('hero-card').style.display='none';
  document.getElementById('complete-card').style.display='';
  document.getElementById('error-card').style.display='none';
  document.getElementById('complete-stats').textContent=`${total.toLocaleString()} frames · ${fps} fps avg`;
  const link=data.output_link||data.upload_link||'';
  const btn=document.getElementById('complete-link');
  if(link){btn.href=link;btn.style.display='';}else{btn.style.display='none';}
  spawnConfetti();
}
function showError(msg){
  document.getElementById('hero-card').style.display='none';
  document.getElementById('complete-card').style.display='none';
  document.getElementById('error-card').style.display='';
  document.getElementById('error-msg').textContent=msg;
}
function spawnConfetti(){
  const colors=['#FF8C00','#00C853','#FFD600','#FF3D00','#00F5FF'];
  const wrap=document.getElementById('complete-inner');
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*40}px;background:${colors[i%5]};animation-delay:${(Math.random()*1.5).toFixed(2)}s;transform:rotate(${Math.random()*360}deg)`;
    wrap.appendChild(p);setTimeout(()=>p.remove(),3000);
  }
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function drawSparkline(){
  const cv=document.getElementById('spark-cv'),ctx=cv.getContext('2d');
  const w=cv.offsetWidth||cv.parentElement?.offsetWidth||200,h=70;
  cv.width=w;cv.height=h;
  ctx.clearRect(0,0,w,h);
  const color=getProgressColor(parseInt(document.getElementById('ring-pct').textContent)||0);
  const pts=sparkData,mn=Math.min(...pts),mx=Math.max(...pts)||1;
  const ys=pts.map(v=>h-4-(v-mn)/(mx-mn||1)*(h-8));
  const xs=pts.map((_,i)=>i*(w/Math.max(1,pts.length-1)));
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,color+'40');g.addColorStop(1,color+'00');
  ctx.beginPath();ctx.moveTo(xs[0],ys[0]);
  for(let i=1;i<pts.length;i++){const cx=(xs[i-1]+xs[i])/2;ctx.bezierCurveTo(cx,ys[i-1],cx,ys[i],xs[i],ys[i]);}
  ctx.lineTo(xs[pts.length-1],h);ctx.lineTo(xs[0],h);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.moveTo(xs[0],ys[0]);
  for(let i=1;i<pts.length;i++){const cx=(xs[i-1]+xs[i])/2;ctx.bezierCurveTo(cx,ys[i-1],cx,ys[i],xs[i],ys[i]);}
  ctx.stroke();
  for(let i=0;i<pts.length;i++){
    ctx.beginPath();ctx.arc(xs[i],ys[i],i===pts.length-1?5:3,0,Math.PI*2);ctx.fillStyle=color;
    if(i===pts.length-1){ctx.shadowColor=color;ctx.shadowBlur=6;}
    ctx.fill();ctx.shadowBlur=0;
  }
}
function idleAnim(){
  const cv=document.getElementById('spark-cv'),ctx=cv.getContext('2d');
  const w=cv.offsetWidth||cv.parentElement?.offsetWidth||200,h=70;
  cv.width=w;cv.height=h;
  ctx.clearRect(0,0,w,h);idlePhase+=0.04;
  const xs=sparkData.map((_,i)=>i*(w/Math.max(1,sparkData.length-1)));
  const ys=sparkData.map((_,i)=>h/2+Math.sin(Date.now()/800+i*0.3)*3+Math.sin(idlePhase+i*0.3)*1.5);
  ctx.beginPath();ctx.strokeStyle='#FF8C0060';ctx.lineWidth=2;ctx.moveTo(xs[0],ys[0]);
  for(let i=1;i<xs.length;i++)ctx.lineTo(xs[i],ys[i]);ctx.stroke();
  idleRAF=requestAnimationFrame(idleAnim);
}

// ─── LOGS ─────────────────────────────────────────────────────────────────────
function appendLogs(logs){
  const body=document.getElementById('log-body');
  const newItems=logs.filter(e=>{
    const ts=e.ts||e.timestamp||0;
    return ts>lastLogTs||(ts===0&&logCount===0);
  });
  if(!newItems.length)return;
  if(logCount===0)body.innerHTML='';
  newItems.forEach(entry=>{
    const ts=entry.ts||entry.timestamp||0;
    if(ts>lastLogTs)lastLogTs=ts;
    const row=document.createElement('div');row.className='log-row';
    const timeStr=ts?new Date(ts*1000).toTimeString().slice(0,8):new Date().toTimeString().slice(0,8);
    const txt=String(entry.message||entry.text||entry||'');
    let sev='INFO';
    if(/fail|error|❌|🔴/i.test(txt))sev='ERROR';
    else if(/warn|⚠/i.test(txt))sev='WARNING';
    else if(/success|complete|✅|upload/i.test(txt))sev='SUCCESS';
    else if(/gpu|cuda|vram/i.test(txt))sev='GPU';
    row.innerHTML=`<span class="log-ts">${timeStr}</span><span class="log-sev sev-${sev}">${sev}</span><span class="log-msg">${txt.replace(/</g,'&lt;')}</span>`;
    body.appendChild(row);logCount++;
    if(logOpen)body.scrollTop=body.scrollHeight;
  });
  document.getElementById('log-badge').textContent=logCount;
  if(!logOpen&&logCount>0){logOpen=true;body.classList.add('open');document.getElementById('log-chev').classList.add('open');}
}
function toggleLog(){
  logOpen=!logOpen;
  document.getElementById('log-body').classList.toggle('open',logOpen);
  document.getElementById('log-chev').classList.toggle('open',logOpen);
}

// ─── SKELETON ─────────────────────────────────────────────────────────────────
function removeSkeleton(){
  document.querySelectorAll('.skeleton').forEach(e=>{e.classList.remove('skeleton');e.style.minWidth='';e.style.minHeight='';});
}

// ─── ELAPSED ──────────────────────────────────────────────────────────────────
function startElapsed(){
  elapsedStart=Date.now();clearInterval(elapsedTimer);
  elapsedTimer=setInterval(()=>{
    const s=Math.floor((Date.now()-elapsedStart)/1000);
    document.getElementById('elapsed').textContent=
      `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },1000);
}

// ─── LIVE CHIP ────────────────────────────────────────────────────────────────
function showChip(txt,cls){
  document.getElementById('live-chip').className='live-chip '+cls;
  document.getElementById('live-txt').textContent=txt;
}

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  try{ws=new WebSocket(`${proto}//${location.host}/ws/live`);}catch(e){wsClose();return;}
  ws.onopen=()=>{reconnectDelay=2000;showChip('● Live Updating','green');startHeartbeat();
    try{ws.send(JSON.stringify({type:'request_state'}));}catch(e){}};
  ws.onmessage=(ev)=>{lastDataTs=Date.now();
    try{const d=JSON.parse(ev.data);if(d&&d.type!=='pong')updateDashboard(d);}catch(e){}};
  ws.onerror=()=>showChip('Live Updating...','amber');
  ws.onclose=wsClose;
}
function wsClose(){
  showChip('Live Updating...','amber');clearInterval(hbTimer);
  setTimeout(()=>{connectWS();reconnectDelay=Math.min(reconnectDelay*2,30000);},reconnectDelay);
}
function startHeartbeat(){
  clearInterval(hbTimer);
  hbTimer=setInterval(()=>{
    if(ws&&ws.readyState===WebSocket.OPEN)try{ws.send('ping');}catch(e){}
    if(Date.now()-lastDataTs>20000&&ws)ws.close();
  },15000);
}

// ─── REST FALLBACK ────────────────────────────────────────────────────────────
async function pollREST(){
  try{
    const r=await fetch('/api/status?_='+Date.now());
    if(!r.ok)return;
    const d=await r.json();
    if(d&&d.phase!=='idle')updateDashboard(d);
    // Fetch logs from snapshot if token present
    if(token){
      const sr=await fetch('/api/job/'+encodeURIComponent(token)+'?_='+Date.now());
      if(sr.ok){const snap=await sr.json();if(Array.isArray(snap.messages)&&snap.messages.length)appendLogs(snap.messages);}
    }
  }catch(e){}
}
// REST fallback: start after 10s if WS not open, then also poll logs every 2s
setTimeout(()=>{if(!ws||ws.readyState!==WebSocket.OPEN){setInterval(pollREST,3000);pollREST();}},10000);
setInterval(async()=>{
  if(!token)return;
  try{
    const sr=await fetch('/api/job/'+encodeURIComponent(token)+'?_='+Date.now());
    if(sr.ok){const snap=await sr.json();if(Array.isArray(snap.messages)&&snap.messages.length)appendLogs(snap.messages);}
  }catch(e){}
},2000);
// Also always poll REST every 2s for live metrics
setInterval(pollREST,2000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildPipe();buildSubsteps();drawDots();startElapsed();idleAnim();connectWS();pollREST();
</script>
